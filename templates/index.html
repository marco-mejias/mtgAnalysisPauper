<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pauper AI - Magic The Gathering</title>
    <style>
        :root {
            --bg-dark: #090a0f;
            --container-bg: #14161f;
            --neon-blue: #00f3ff;
            --neon-purple: #b026ff;
            --neon-green: #39ff14;
            --text-light: #e0e6ed;
            --text-muted: #8b92a5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: var(--neon-blue); display: flex; align-items: center; gap: 10px; }
        
        .main-container {
            background: var(--container-bg);
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid #1f2333;
        }

        /* --- ESTILOS DE BÚSQUEDA Y AUTOCOMPLETADO --- */
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
        
        .autocomplete-container { position: relative; flex: 1; }
        
        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #2d3139;
            background: #0f1115;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        input:focus { outline: none; border-color: var(--neon-blue); }

        .suggestions-box {
            position: absolute; top: 100%; left: 0; right: 0;
            background: var(--bg-dark);
            border: 1px solid var(--neon-blue);
            border-radius: 0 0 6px 6px;
            border-top: none;
            z-index: 1000;
            display: none;
            max-height: 250px;
            overflow-y: auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .suggestion-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #2d3139; transition: 0.2s; }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: #1a1d24; color: var(--neon-blue); padding-left: 20px; }

        button {
            padding: 12px 24px;
            background: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: rgba(0, 243, 255, 0.1); box-shadow: 0 0 10px rgba(0, 243, 255, 0.3); }

        /* --- ESTILOS DE ANÁLISIS EXPLICABLE --- */
        .analysis-panel {
            background: #11141a;
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        
        .ai-tag {
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .deck-card {
            background: #1a1d24; border: 1px solid #2d3139;
            border-left: 4px solid var(--neon-blue);
            border-radius: 6px; padding: 15px; margin-bottom: 10px;
            cursor: pointer; transition: 0.2s;
        }
        .deck-card:hover { border-left-width: 8px; background: #20242d; }
        
        .deck-header { display: flex; justify-content: space-between; align-items: center; font-size: 1.1rem; font-weight: bold; }
        .deck-score { color: var(--neon-green); font-size: 1.2rem; }
        
        .badge {
            display: inline-block; padding: 3px 8px;
            border-radius: 4px; font-size: 0.8rem;
            background: #333; color: white; margin-right: 5px;
        }

        .deck-details {
            display: none; background: #0f1115; padding: 15px; margin-top: 10px;
            border-radius: 6px; border-left: 2px dashed #444; font-size: 0.9rem; color: var(--text-light);
        }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .detail-label { color: var(--text-muted); }
        .detail-value { font-weight: bold; }

        .loader { display: none; margin-top: 20px; color: var(--neon-purple); font-weight: bold; }
    </style>
</head>
<body>

    <h1>🧠 PAUPER AI</h1>

    <div class="main-container">
        <div id="search-area" class="search-box">
            <div class="autocomplete-container">
                <input type="text" id="searchInput" placeholder="Ej: Murmuring Mystic..." autocomplete="off">
                <div id="suggestions" class="suggestions-box"></div>
            </div>
            <button id="searchBtn" onclick="initiateSearch()">Buscar Carta</button>
        </div>

        <div id="loader" class="loader">Analizando carta con Inteligencia Artificial...</div>

        <div id="results-area" style="display: none;">
            
            <div id="card-analysis-panel" class="analysis-panel">
                <h3 style="margin-top: 0; color: var(--neon-purple);">🔍 Radiografía de la Carta</h3>
                <p><strong>Poder Base Evaluado:</strong> <span id="baseScoreDisplay" style="color: var(--neon-green); font-size: 1.2rem; font-weight: bold;"></span> / 10</p>
                <p style="margin-bottom: 5px; color: var(--text-muted);">Capacidades detectadas por el TextParser:</p>
                <div id="capabilities-tags" class="tag-container"></div>
            </div>

            <h3 style="color: var(--text-light); border-bottom: 1px solid #333; padding-bottom: 5px;">🏆 Mazos Compatibles</h3>
            <div id="top-fits-container"></div>

            <h3 style="color: var(--text-light); border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 30px;">🚫 Bloqueado por la IA</h3>
            <div id="rejected-container"></div>

            <button onclick="resetSearch()" style="margin-top: 20px; width: 100%; border-color: #555; color: #aaa;">Analizar otra carta</button>
        </div>
    </div>

    <script>
        // --- AUTOCOMPLETADO SCRYFALL ---
        let typingTimer;
        const searchInput = document.getElementById('searchInput');
        const suggestionsBox = document.getElementById('suggestions');

        searchInput.addEventListener('input', function() {
            clearTimeout(typingTimer);
            const query = this.value.trim();
            
            if (query.length < 3) {
                suggestionsBox.style.display = 'none';
                return;
            }

            typingTimer = setTimeout(async () => {
                try {
                    const response = await fetch(`https://api.scryfall.com/cards/autocomplete?q=${query}`);
                    const data = await response.json();

                    if (data.data && data.data.length > 0) {
                        suggestionsBox.innerHTML = '';
                        data.data.forEach(cardName => {
                            const div = document.createElement('div');
                            div.className = 'suggestion-item';
                            div.innerText = cardName;
                            div.onclick = () => {
                                searchInput.value = cardName;
                                suggestionsBox.style.display = 'none';
                                initiateSearch();
                            };
                            suggestionsBox.appendChild(div);
                        });
                        suggestionsBox.style.display = 'block';
                    } else {
                        suggestionsBox.style.display = 'none';
                    }
                } catch (error) { console.error("Error Autocompletado:", error); }
            }, 300);
        });

        document.addEventListener('click', (e) => {
            if (!document.querySelector('.autocomplete-container').contains(e.target)) {
                suggestionsBox.style.display = 'none';
            }
        });

        // --- BÚSQUEDA Y ANÁLISIS ---
        async function initiateSearch() {
            const cardName = searchInput.value.trim();
            if(!cardName) return;

            document.getElementById('search-area').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            try {
                const searchRes = await fetch(`/api/search?name=${encodeURIComponent(cardName)}`);
                if (!searchRes.ok) throw new Error("Carta no encontrada");
                const cardData = await searchRes.json();

                const evalRes = await fetch('/api/evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(cardData)
                });
                const aiData = await evalRes.json();

                renderResults(aiData);
            } catch (error) {
                alert(error.message);
                resetSearch();
            }
        }

        // --- RENDERIZADO DE RESULTADOS EXPLICABLES ---
        function renderResults(results) {
            document.getElementById('loader').style.display = 'none';
            
            // 1. Radiografía
            document.getElementById('baseScoreDisplay').innerText = results.analysis.base_score.toFixed(1);
            const tagsContainer = document.getElementById('capabilities-tags');
            tagsContainer.innerHTML = ''; 
            
            const allFeatures = [...(results.analysis.mechanics || []), ...(results.analysis.actions || [])];
            if(allFeatures.length === 0) {
                tagsContainer.innerHTML = '<span class="ai-tag" style="border-color: #555; color: #888;">Ninguna mecánica detectada</span>';
            } else {
                allFeatures.forEach(feature => {
                    tagsContainer.innerHTML += `<span class="ai-tag">${feature.replace('effect_', '').replace('mechanic_', '').toUpperCase()}</span>`;
                });
            }

            // 2. Mazos Compatibles
            const topContainer = document.getElementById('top-fits-container');
            topContainer.innerHTML = '';
            
            if (!results.top_fits || results.top_fits.length === 0) {
                topContainer.innerHTML = "<p style='color: var(--text-muted);'>Esta carta no entra en el metajuego competitivo actual.</p>";
            } else {
                results.top_fits.forEach((fit) => {
                    const deckElement = document.createElement('div');
                    deckElement.className = 'deck-card';
                    
                    // --- NUEVA LÓGICA DE AUDITORÍA ---
                    const auditHtml = fit.audit_log ? fit.audit_log.map(log => {
                        let icon = "✅";
                        if (log.includes("Penalización")) icon = "⚖️";
                        if (log.includes("Bonus") || log.includes("Sideboard Tech")) icon = "📈";
                        if (log.includes("Veredicto")) icon = "🧠";
                        return `<div style="margin-bottom: 6px;">${icon} <span style="color: #bbb;">${log}</span></div>`;
                    }).join('') : '';

                    deckElement.innerHTML = `
                        <div class="deck-header">
                            <span class="deck-name">${fit.deck}</span>
                            <span class="deck-score">${fit.score.toFixed(1)}</span>
                        </div>
                        <div style="margin-top: 10px;">
                            <span class="badge">${fit.role}</span>
                            <span class="badge" style="background: var(--neon-purple);">${fit.status}</span>
                            <span style="font-size: 0.8rem; float: right; color: var(--text-muted);">Ver detalles 🔽</span>
                        </div>
                        <div class="deck-details">
                            <div class="detail-row">
                                <span class="detail-label">Umbral del Rol (${fit.role}):</span>
                                <span class="detail-value">${fit.meta_stats ? fit.meta_stats.min : 'N/A'}</span>
                            </div>
                            
                            <div style="margin-top: 15px; padding-top: 10px; border-top: 1px dashed #333;">
                                <span class="detail-label" style="color: var(--neon-blue); font-weight: bold;">📊 Auditoría de la IA:</span><br>
                                <div style="margin-top: 8px; font-size: 0.85rem; line-height: 1.4;">
                                    ${auditHtml}
                                    ${fit.notes && fit.notes.length > 0 ? `<div style="margin-top: 12px; color: var(--neon-purple);">💡 Notas extra: ${fit.notes.join(', ')}</div>` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                    deckElement.onclick = function() {
                        const details = this.querySelector('.deck-details');
                        details.style.display = details.style.display === 'block' ? 'none' : 'block';
                    };
                    topContainer.appendChild(deckElement);
                });
            }

            // 3. Mazos Rechazados
            const rejContainer = document.getElementById('rejected-container');
            rejContainer.innerHTML = '';
            if (results.rejected && results.rejected.length > 0) {
                results.rejected.forEach(rej => {
                    const div = document.createElement('div');
                    div.className = 'deck-details';
                    div.style.display = 'block';
                    div.style.borderLeftColor = '#ff3366';
                    div.style.marginBottom = '8px';
                    div.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-weight: bold; color: var(--text-light); min-width: 120px;">${rej.deck}</span>
                            <span style="color: #ff3366; font-size: 0.85rem; text-align: left; max-width: 70%;">❌ ${rej.reason}</span>
                        </div>
                    `;
                    rejContainer.appendChild(div);
                });
            } else {
                rejContainer.innerHTML = "<p style='color: #666;'>No hay datos de rechazo registrados.</p>";
            }

            document.getElementById('results-area').style.display = 'block';
        }

        function resetSearch() {
            document.getElementById('results-area').style.display = 'none';
            document.getElementById('search-area').style.display = 'flex';
            searchInput.value = '';
            searchInput.focus();
        }
    </script>
</body>
</html>
